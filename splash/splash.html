<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Radio</title>
    <link rel="stylesheet" href="splash/splash.css">
</head>
<body>
    <div class="splash-screen" id="splash">
        <canvas id="stars"></canvas>
        <div class="nebula"></div>
        <div class="solar-system">
            <div class="sun"></div>
            <div class="orbit orbit-1"><div class="planet planet-1"></div></div>
            <div class="orbit orbit-2"><div class="planet planet-2"></div></div>
            <div class="orbit orbit-3"><div class="planet planet-3"></div></div>
        </div>
        <div class="title-container">
            <h1 class="title">
                <span class="space">SPACE</span>
                <span class="radio">RADIO</span>
            </h1>
            <p class="subtitle">Listen to the Universe</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
        <div class="enter-btn" id="enterBtn">Enter the Cosmos</div>
    </div>
    <script src="splash/splash.js"></script>
</body>
</html>

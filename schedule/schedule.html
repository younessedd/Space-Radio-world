<section class="schedule fade-in" id="schedule">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Schedule</h2>
            <p class="section-subtitle">Daily programming lineup</p>
        </div>
        <div class="schedule-tabs">
            <button class="schedule-tab active" data-day="monday">Mon</button>
            <button class="schedule-tab" data-day="tuesday">Tue</button>
            <button class="schedule-tab" data-day="wednesday">Wed</button>
            <button class="schedule-tab" data-day="thursday">Thu</button>
            <button class="schedule-tab" data-day="friday">Fri</button>
            <button class="schedule-tab" data-day="saturday">Sat</button>
            <button class="schedule-tab" data-day="sunday">Sun</button>
        </div>
        <div class="schedule-content" id="scheduleContent"></div>
    </div>
</section>

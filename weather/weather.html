<section class="weather fade-in" id="weather">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Weather</h2>
            <p class="section-subtitle">Current weather conditions around the world</p>
            <p class="weather-date" id="weatherDate"></p>
        </div>
        
        <div class="weather-controls">
            <div class="city-search-wrapper">
                <div class="city-search">
                    <input type="text" id="cityInput" placeholder="Search city..." autocomplete="off">
                    <button id="searchCityBtn" class="search-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    </button>
                    <button id="locationBtn" class="search-btn" title="Use my location">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
                    </button>
                </div>
                <div class="city-suggestions" id="citySuggestions"></div>
            </div>
            <div class="unit-toggle">
                <button class="unit-btn active" data-unit="metric">°C</button>
                <button class="unit-btn" data-unit="imperial">°F</button>
            </div>
        </div>
        
        <div class="weather-content" id="weatherContent">
            <div class="loading-spinner"></div>
        </div>
        
        <div class="forecast-section" id="forecastSection">
            <h3 class="forecast-title">5-Day Forecast</h3>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>
    </div>
</section>

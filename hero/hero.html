<section class="hero" id="hero">
    <canvas id="hero-stars"></canvas>
    <div class="hero-content">
        <div class="hero-badge">🚀 Live Now</div>
        <h1 class="hero-title">
            <span class="title-line">Welcome to</span>
            <span class="title-main">Space Radio</span>
        </h1>
        <p class="hero-subtitle">Your gateway to infinite soundscapes. Stream live radio from across the universe.</p>
        <div class="hero-actions">
            <button class="btn-primary" id="listenLiveBtn">
                <span class="btn-icon">🎧</span>
                Listen Live
            </button>
            <button class="btn-secondary" id="exploreBtn">
                <span class="btn-icon">🔍</span>
                Explore
            </button>
        </div>
        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-number" data-count="150">0</span>
                <span class="stat-label">Stations</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" data-count="50000">0</span>
                <span class="stat-label">Listeners</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" data-count="24">0</span>
                <span class="stat-label">/7 Live</span>
            </div>
        </div>
    </div>
    <div class="floating-elements">
        <div class="floating-icon icon-1">🎵</div>
        <div class="floating-icon icon-2">📻</div>
        <div class="floating-icon icon-3">🎸</div>
        <div class="floating-icon icon-4">🎹</div>
        <div class="floating-icon icon-5">🎤</div>
    </div>
    <div class="scroll-indicator">
        <span>Scroll to explore</span>
        <div class="scroll-arrow"></div>
    </div>
</section>

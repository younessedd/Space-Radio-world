<section class="radio-player" id="radio">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Live Radio</h2>
            <p class="section-subtitle">Stream live stations from around the world</p>
        </div>
        
        <div class="radio-search">
            <input type="text" id="stationSearch" placeholder="Search stations by name or genre...">
            <button id="searchBtn" class="search-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            </button>
        </div>
        
        <div class="genre-filters">
            <button class="genre-btn active" data-genre="">All</button>
            <button class="genre-btn" data-genre="pop">Pop</button>
            <button class="genre-btn" data-genre="rock">Rock</button>
            <button class="genre-btn" data-genre="jazz">Jazz</button>
            <button class="genre-btn" data-genre="classical">Classical</button>
            <button class="genre-btn" data-genre="electronic">Electronic</button>
            <button class="genre-btn" data-genre="news">News</button>
        </div>
        
        <div class="stations-grid" id="stationsGrid">
            <div class="loading-spinner"></div>
        </div>
        
        <div class="radio-player-bar" id="playerBar">
            <div class="now-playing">
                <div class="station-logo" id="currentLogo">
                    <span>📻</span>
                </div>
                <div class="station-info">
                    <h4 id="currentStation">Select a station</h4>
                    <p id="currentGenre">-</p>
                </div>
            </div>
            
            <div class="player-controls">
                <button class="control-btn play-btn" id="playPauseBtn">
                    <span class="play-icon">▶</span>
                </button>
            </div>
            
            <div class="volume-control">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
            </div>
            
            <div class="audio-visualizer" id="audioVisualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>
    
    <audio id="audioPlayer"></audio>
</section>

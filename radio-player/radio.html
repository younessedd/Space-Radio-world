<section class="radio-player fade-in" id="radio">
    <div class="radio-search">
        <input type="text" id="stationSearch" placeholder="Search stations by name, genre, or country..." autocomplete="off">
        <div class="search-suggestions" id="searchSuggestions"></div>
        <button id="searchBtn" class="search-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button id="locateBtn" class="locate-btn" title="Detect my location">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
        </button>
    </div>
    
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Live Radio</h2>
            <p class="section-subtitle">Stream live stations from around the world</p>
        </div>
        
        <div class="genre-filters">
            <button class="genre-btn active" data-genre="">All</button>
            <button class="genre-btn" data-genre="pop">Pop</button>
            <button class="genre-btn" data-genre="rock">Rock</button>
            <button class="genre-btn" data-genre="jazz">Jazz</button>
            <button class="genre-btn" data-genre="classical">Classical</button>
            <button class="genre-btn" data-genre="electronic">Electronic</button>
            <button class="genre-btn" data-genre="news">News</button>
        </div>

            </div>
